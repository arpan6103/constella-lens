<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constella Lens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #00ff88;
    --accent-dim: #00ff8822;
    --accent-mid: #00ff8844;
    --text: #e0e0e0;
    --text-dim: #555;
    --text-mid: #888;
    --node1: #00ff88;
    --node2: #00aaff;
    --node3: #ff6644;
    --warn: #ffaa00;
    --danger: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 52px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-mid);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  .dot.offline { background: var(--danger); animation: none; }
  .dot.warn { background: var(--warn); }

  /* Search */
  .search-section {
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .search-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .search-box {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
    background: var(--surface);
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim), 0 0 20px var(--accent-dim);
  }

  .search-prompt {
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    background: var(--accent-dim);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    caret-color: var(--accent);
  }

  input::placeholder { color: var(--text-dim); }

  button {
    padding: 14px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  button:hover { background: #00ffaa; }
  button:active { transform: scale(0.98); }
  button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

  /* Quick queries */
  .quick-queries {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .quick-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-mid);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Results */
  .results-section { animation: fadeDown 0.6s 0.3s ease both; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .results-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .result-count {
    font-size: 11px;
    color: var(--text-mid);
  }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
    transition: border-color 0.15s, transform 0.15s;
    animation: slideIn 0.3s ease both;
  }

  .result-card:hover {
    border-color: #333;
    transform: translateX(2px);
  }

  .result-card.high-score { border-left: 2px solid var(--accent); }
  .result-card.mid-score { border-left: 2px solid var(--warn); }
  .result-card.low-score { border-left: 2px solid var(--border); }

  .log-text {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
    word-break: break-all;
  }

  .log-text .highlight-fail { color: var(--danger); }
  .log-text .highlight-recover { color: var(--accent); }
  .log-text .highlight-wal { color: var(--node2); }
  .log-text .highlight-node { color: var(--warn); }

  .log-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #1a1a1a;
    color: var(--text-mid);
    border: 1px solid var(--border);
  }

  .meta-tag.node1 { color: var(--node1); border-color: #00ff8833; }
  .meta-tag.node2 { color: var(--node2); border-color: #00aaff33; }
  .meta-tag.node3 { color: var(--node3); border-color: #ff664433; }

  .score-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .score-high { background: var(--accent-dim); color: var(--accent); border: 1px solid #00ff8833; }
  .score-mid { background: #ffaa0011; color: var(--warn); border: 1px solid #ffaa0033; }
  .score-low { background: #1a1a1a; color: var(--text-dim); border: 1px solid var(--border); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-dim);
  }

  .empty-state .icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-state p { font-size: 12px; line-height: 2; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 24px;
    color: var(--text-mid);
    font-size: 12px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Error */
  .error-msg {
    padding: 16px;
    background: #ff444411;
    border: 1px solid #ff444433;
    border-radius: 8px;
    color: var(--danger);
    font-size: 12px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-row">
      <div class="logo-icon"></div>
      <h1>Constella<span>Lens</span></h1>
    </div>
    <p class="subtitle">Semantic log intelligence for distributed systems</p>
  </header>

  <div class="status-bar">
    <div class="status-item"><div class="dot"></div> node1:6000 online</div>
    <div class="status-item"><div class="dot"></div> node2:6001 online</div>
    <div class="status-item"><div class="dot"></div> node3:6002 online</div>
    <div class="status-item" style="margin-left: auto;">
      <div class="dot warn"></div>
      <span id="vector-count">loading index...</span>
    </div>
  </div>

  <div class="search-section">
    <span class="search-label">Natural Language Query</span>
    <div class="search-box">
      <span class="search-prompt">› query</span>
      <input type="text" id="query-input" placeholder="which nodes went down? show me WAL replays..." autocomplete="off" />
      <button id="search-btn" onclick="search()">Search</button>
    </div>
    <div class="quick-queries">
      <button class="quick-btn" onclick="quickQuery('which nodes went down?')">node failures</button>
      <button class="quick-btn" onclick="quickQuery('show me node recovery events')">recoveries</button>
      <button class="quick-btn" onclick="quickQuery('WAL replay on startup')">WAL replays</button>
      <button class="quick-btn" onclick="quickQuery('high request processing volume')">high load</button>
      <button class="quick-btn" onclick="quickQuery('replica assignment for keys')">replication</button>
      <button class="quick-btn" onclick="quickQuery('node started listening')">startups</button>
    </div>
  </div>

  <div class="results-section">
    <div class="results-header">
      <span class="results-label">Results</span>
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="results-list" id="results-list">
      <div class="empty-state">
        <div class="icon">◎</div>
        <p>Enter a natural language query above<br>to search across Constella node logs</p>
      </div>
    </div>
  </div>

</div>

<script>
  const input = document.getElementById('query-input');
  const btn = document.getElementById('search-btn');
  const list = document.getElementById('results-list');
  const countEl = document.getElementById('result-count');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  function quickQuery(q) {
    input.value = q;
    search();
  }

  function nodeClass(node) {
    if (node.includes('node1')) return 'node1';
    if (node.includes('node2')) return 'node2';
    if (node.includes('node3')) return 'node3';
    return '';
  }

  function highlightLog(log) {
    if (log.includes('unavailable') || log.includes('down')) {
      return `<span class="highlight-fail">${escHtml(log)}</span>`;
    }
    if (log.includes('recovered') || log.includes('recovery')) {
      return `<span class="highlight-recover">${escHtml(log)}</span>`;
    }
    if (log.includes('WAL') || log.includes('wal')) {
      return `<span class="highlight-wal">${escHtml(log)}</span>`;
    }
    return escHtml(log);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scoreClass(score) {
    if (score >= 0.5) return 'high';
    if (score >= 0.25) return 'mid';
    return 'low';
  }

  function cardClass(score) {
    if (score >= 0.5) return 'high-score';
    if (score >= 0.25) return 'mid-score';
    return 'low-score';
  }

  function formatTime(ts) {
    try {
      return new Date(ts + 'Z').toLocaleTimeString();
    } catch { return ts; }
  }

  async function search() {
    const q = input.value.trim();
    if (!q) return;

    btn.disabled = true;
    countEl.textContent = '';
    list.innerHTML = '<div class="loading"><div class="spinner"></div>querying vector index...</div>';

    try {
      const res = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q })
      });
      const data = await res.json();
      const results = data.results || [];

      countEl.textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;

      if (results.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">◎</div><p>No matching logs found</p></div>';
        return;
      }

      list.innerHTML = results.map((r, i) => `
        <div class="result-card ${cardClass(r.score)}" style="animation-delay: ${i * 0.04}s">
          <div>
            <div class="log-text">${highlightLog(r.log)}</div>
            <div class="log-meta">
              <span class="meta-tag ${nodeClass(r.node)}">${escHtml(r.node)}</span>
              <span class="meta-tag">${formatTime(r.timestamp)}</span>
            </div>
          </div>
          <div class="score-badge score-${scoreClass(r.score)}">${(r.score * 100).toFixed(0)}%</div>
        </div>
      `).join('');

    } catch (err) {
      list.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  // Load index stats on page load
  async function loadStats() {
    try {
      const res = await fetch('/stats');
      const data = await res.json();
      document.getElementById('vector-count').textContent = `${data.total_vectors} vectors indexed`;
    } catch {
      document.getElementById('vector-count').textContent = 'index connected';
    }
  }

  loadStats();
</script>
</body>
</html>
